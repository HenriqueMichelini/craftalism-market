titles:
  categories: "&8Craftalism Market"

messages:
  unavailable-no-cache: "&cThe market is unavailable right now. No cached data is available yet."
  opened-live: "&aMarket data loaded."
  opened-read-only: "&6Market browsing is in read-only preview mode."
  quote-unavailable: "&cQuote data is currently unavailable."
  execute-unavailable: "&cTrade execution is currently unavailable."
  trade-disabled: "&cTrading is not available right now."
  buy-success: "&aPurchased {quantity} item(s) for {total}."
  buy-overflow: "&ePurchased {quantity} item(s) for {total}. Dropped {dropped} item(s) because your inventory was full."
  sell-success: "&aSold {quantity} item(s) for {total}."
  sell-no-items: "&cYou do not have that item in your inventory."
  sell-quantity-adjusted: "&eAdjusted sell quantity to {quantity} based on your inventory."
  sell-removal-failed: "&cSell completed for {total}, but local removal only removed {removed}/{executed} {item}. Missing: {missing}. Contact staff."
  sell-removal-failed-log: "Market sell compensation issue for player {playerId}: item={item}, executed={executed}, removed={removed}, missing={missing}, settled={total}, snapshotVersion={snapshotVersion}"
  rejections:
    STALE_QUOTE: "&eThat quote is stale. Refreshing now."
    QUOTE_EXPIRED: "&eThat quote expired. Refreshing now."
    ITEM_BLOCKED: "&cThis item is currently blocked."
    ITEM_NOT_OPERATING: "&cThis item is not operating right now."
    INSUFFICIENT_STOCK: "&cThere is not enough stock for that purchase."
    INSUFFICIENT_FUNDS: "&cYou do not have enough funds for that purchase."
    MARKET_CLOSED: "&cThe market is currently closed."
    INVALID_QUANTITY: "&cThat quantity is invalid."
    RATE_LIMITED: "&cToo many requests. Slow down and try again."
    API_UNAVAILABLE: "&cThe market API is unavailable right now."
    UNKNOWN_ITEM: "&cThat item is no longer available."

market-api:
  base-url: "http://127.0.0.1:8080"
  snapshot-path: "/market/snapshot"
  quote-path: "/market/quote"
  execute-path: "/market/execute"
  auth-token: ""
  auth:
    issuer-url: ""
    token-path: "/oauth2/token"
    client-id: ""
    client-secret: ""
    api-key: ""
    scopes: ""
  connect-timeout-ms: 3000
  request-timeout-ms: 5000
  quote-debounce-ticks: 6

market-display:
  categories:
    farming:
      icon: WHEAT
      description:
        - "&7Browse staple crops and ranch goods."
    mining:
      icon: IRON_PICKAXE
      description:
        - "&7Ore and processed metal examples."
  items:
    wheat:
      description:
        - "&7A common crop traded across the server."
    bread:
      description:
        - "&7Processed food item for the market."
    iron_ingot:
      description:
        - "&7Useful for testing a second category flow."
    diamond:
      description:
        - "&7High-value item shown in informational trade mode."
